name: 跨平台质量检查

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, macos-14, ubuntu-22.04]

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Linux 桌面依赖
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: 安装前端依赖
        run: npm ci

      - name: 准备当前平台 Mihomo 内核
        run: npm run prepare:mihomo

      - name: 检查前端类型
        run: npm run typecheck

      - name: 运行前端测试
        run: npm test

      - name: 构建前端
        run: npm run build

      - name: 检查 Rust 后端
        working-directory: src-tauri
        run: cargo check

      - name: 运行 Rust 单元测试
        working-directory: src-tauri
        run: cargo test --lib
