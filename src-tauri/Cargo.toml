[package]
name = "clash-mg"
version = "0.1.0"
description = "A lightweight Tauri proxy manager shell"
authors = ["clash-mg"]
edition = "2021"

[lib]
name = "clash_mg_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
thiserror = "2"
