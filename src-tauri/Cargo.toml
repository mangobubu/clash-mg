[package]
name = "clash-mg"
version = "0.1.0"
description = "A modern Clash desktop client prototype"
authors = ["clash-mg contributors"]
edition = "2021"

[lib]
name = "clash_mg_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.6.3", features = [] }

[dependencies]
tauri = { version = "2.11.3", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

