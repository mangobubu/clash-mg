[[permission]]
identifier = "allow-app-backend"
description = "允许前端读写本地应用数据、读取运行进程，并通过 Rust 后端访问 Mihomo 外部控制器。"
commands.allow = [
  "get_app_snapshot",
  "save_app_snapshot",
  "refresh_runtime_data",
  "refresh_runtime_connections",
  "select_proxy_node",
  "close_runtime_connections",
  "refresh_proxy_providers",
  "refresh_local_subscriptions",
  "delete_local_subscription",
  "test_proxy_delay",
  "start_mihomo_core",
  "get_tun_service_status",
  "install_tun_service",
  "uninstall_tun_service",
  "list_running_processes",
  "get_lan_ip",
]
